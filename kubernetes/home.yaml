apiVersion: apps/v1
kind: Deployment

metadata:
 name: home

spec:

 replicas: 2

 selector:
  matchLabels:
   app: home


 template:

  metadata:
   labels:
    app: home


  spec:

   containers:

   - name: home

     image: jerrymbata1/home-page:v1

     ports:
     - containerPort: 80


---

apiVersion: v1
kind: Service

metadata:
 name: home-service


spec:

 selector:
  app: home


 ports:

 - port: 80
   targetPort: 80
