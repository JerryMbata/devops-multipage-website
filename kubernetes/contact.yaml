apiVersion: apps/v1
kind: Deployment

metadata:
  name: contact

spec:
  replicas: 2

  selector:
    matchLabels:
      app: contact

  template:
    metadata:
      labels:
        app: contact

    spec:
      containers:
      - name: contact
        image: jerrymbata1/contact-page:v1
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: contact-service

spec:
  selector:
    app: contact

  ports:
  - port: 80
    targetPort: 80
